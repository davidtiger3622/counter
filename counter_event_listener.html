<!doctype html>
<html>
  <head>
    <title>js counter event listener</title>
    <style>
      body {
        font-family: "Times New Roman", Times, serif;
        font-size: 1.2rem;
      }

      h1 {
        text-transform: uppercase;
        font-size: 3rem;
      }

      #count {
        font-size: 3rem;
        font-weight: bold;
      }

      button {
        font-family: "Times New Roman", Times, serif;
        font-size: 1.3rem;
        padding: 0.4rem 0.9rem;
        margin-right: 0.35rem;
        border: 1px solid #888;
        border-radius: 6px;
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
      }

      button:hover,
      button:focus {
        border-color: #3399ff;
        box-shadow: 0 0 10px rgba(51, 153, 255, 0.8);
        outline: none;
      }

      button:active {
        border-color: #1a73e8;
        box-shadow: 0 0 14px rgba(26, 115, 232, 0.95);
      }

      #message {
        min-height: 1.5rem;
        margin-top: 0.7rem;
        color: #1a73e8;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>count</h1>
    <p id="count">0</p>

    <button id="btnPlus" type="button">+</button>
    <button id="btnMinus" type="button">-</button>
    <button id="btnReset" type="button">Reset</button>
    <button id="btnSave" type="button">Save</button>
    <button id="btnLoad" type="button">Load</button>

    <p id="message"></p>

    <script src="counter_event_listener.js"></script>
  </body>
</html>
